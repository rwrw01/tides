<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Getijden</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Getijden">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#0b3d5c">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
:root{
  --bg:#f2f2f7; --sheet:rgba(255,255,255,.78); --tile:rgba(120,120,128,.12);
  --text:#000; --text-2:#6e6e73; --blue:#0a84ff; --sea:#1276b0; --orange:#ff9500; --red:#ff3b30;
  --sep:rgba(60,60,67,.15);
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#000; --sheet:rgba(28,28,30,.80); --tile:rgba(118,118,128,.24);
         --text:#fff; --text-2:#98989e; --sep:rgba(84,84,88,.4); }
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;
     background:var(--bg);color:var(--text);touch-action:manipulation;overflow:hidden}
#map{position:fixed;inset:0;z-index:0;background:#b5d3e7}
#mapErr{display:none;position:fixed;inset:0;z-index:0;align-items:center;justify-content:center;
        text-align:center;color:var(--text-2);padding:2rem;font-size:.95rem}
.ctl{position:fixed;right:calc(12px + env(safe-area-inset-right));z-index:20;width:44px;height:44px;
     border-radius:50%;border:0;background:var(--sheet);-webkit-backdrop-filter:blur(20px) saturate(1.8);
     backdrop-filter:blur(20px) saturate(1.8);box-shadow:0 2px 10px rgba(0,0,0,.18);
     display:flex;align-items:center;justify-content:center;color:var(--blue);cursor:pointer}
#locBtn{top:calc(14px + env(safe-area-inset-top))}
#layerBtn{top:calc(66px + env(safe-area-inset-top))}
#radarBtn{top:calc(118px + env(safe-area-inset-top))}
#radarBtn.on{color:#fff;background:var(--blue)}
.radar-bar{position:fixed;left:12px;right:68px;top:calc(14px + env(safe-area-inset-top));z-index:15;
  display:none;align-items:center;gap:.6rem;padding:.45rem .8rem;border-radius:99px;
  background:var(--sheet);-webkit-backdrop-filter:blur(20px) saturate(1.8);backdrop-filter:blur(20px) saturate(1.8);
  box-shadow:0 2px 10px rgba(0,0,0,.18)}
.radar-bar.on{display:flex}
.radar-bar button{border:0;background:none;color:var(--blue);font-size:1.05rem;line-height:1;cursor:pointer;padding:.1rem}
.radar-bar input[type=range]{flex:1;accent-color:var(--blue);min-width:0}
.radar-bar .t{font-size:.8rem;font-weight:600;font-variant-numeric:tabular-nums;color:var(--text-2);white-space:nowrap}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:10;
       background:var(--sheet);-webkit-backdrop-filter:blur(24px) saturate(1.8);backdrop-filter:blur(24px) saturate(1.8);
       border-radius:16px 16px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.16);
       padding:8px 16px calc(14px + env(safe-area-inset-bottom));
       transition:transform .3s cubic-bezier(.3,.9,.4,1)}
.grabber{width:36px;height:5px;border-radius:3px;background:rgba(120,120,128,.35);margin:2px auto 10px}
.loc-row{display:flex;align-items:baseline;justify-content:space-between;gap:.6rem;min-height:1.5em}
.loc-name{font-size:1.05rem;font-weight:600;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pill{flex-shrink:0;font-size:.72rem;font-weight:600;padding:.18rem .55rem;border-radius:99px;background:var(--tile);color:var(--text-2)}
.pill.macro{background:rgba(255,59,48,.15);color:var(--red)}
.pill.meso{background:rgba(10,132,255,.15);color:var(--blue)}
.pill.micro{background:rgba(255,149,0,.15);color:var(--orange)}
.hint{font-size:.9rem;color:var(--text-2);text-align:center;padding:.6rem 0 .4rem}
.hint.err{color:var(--red)}
.tiles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
.tile{background:var(--tile);border-radius:12px;padding:.55rem .65rem;min-width:0}
.tile .k{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-2);
         display:flex;align-items:center;gap:.25rem}
.tile .v{font-size:1.25rem;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em;margin-top:.1rem}
.tile .s{font-size:.72rem;color:var(--text-2);font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tile.hw .v{color:var(--sea)} .tile.lw .v{color:var(--orange)}
@media (prefers-color-scheme: dark){ .tile.hw .v{color:#64b5e8} }
#spark{width:100%;height:74px;display:block;margin-top:10px}
.colofon{margin-top:10px;padding-top:8px;border-top:1px solid var(--sep);
         font-size:.66rem;color:var(--text-2);text-align:center}
.colofon a{color:var(--text-2)}
.leaflet-control-attribution{font-size:9px !important;background:rgba(255,255,255,.6) !important}
</style>
</head>
<body>

<div id="map"></div>
<div id="mapErr">Kaart kon niet geladen worden.<br>Controleer je internetverbinding.</div>

<button class="ctl" id="locBtn" aria-label="Mijn locatie">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M21.4 2.6c.5.5.6 1.2.3 1.8L13.5 21.6c-.6 1.2-2.4 1-2.7-.3L9.2 14.8 2.7 13.2c-1.3-.3-1.5-2.1-.3-2.7L19.6 2.3c.6-.3 1.3-.2 1.8.3z"/></svg>
</button>
<button class="ctl" id="layerBtn" aria-label="Kaart of satelliet">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 1 8l11 6 11-6-11-6zM1 12.5 12 18.5l11-6v3L12 21.5 1 15.5v-3z"/></svg>
</button>
<button class="ctl" id="radarBtn" aria-label="Buienradar aan/uit">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 14.5a4.5 4.5 0 0 1 .4-9 6 6 0 0 1 11.3 1.6A4 4 0 0 1 17.5 14.5H6z"/><path d="M8 17l-1.5 4M12.5 17l-1.5 4M17 17l-1.5 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>
</button>
<div class="radar-bar" id="radarBar">
  <button id="radarPlay" aria-label="Afspelen">▶</button>
  <input type="range" id="radarSlider" min="0" max="0" value="0" step="1">
  <span class="t" id="radarTime">–</span>
</div>

<div class="sheet" id="sheet">
  <div class="grabber"></div>
  <div class="loc-row">
    <div class="loc-name" id="locName">Getijden</div>
    <span class="pill" id="pill" style="display:none"></span>
  </div>
  <div class="hint" id="hint">Tik op de kaart om een pin te zetten</div>
  <div id="data" style="display:none">
    <div class="tiles">
      <div class="tile hw"><div class="k">Hoogwater</div><div class="v" id="hwT">–</div><div class="s" id="hwS"></div></div>
      <div class="tile lw"><div class="k">Laagwater</div><div class="v" id="lwT">–</div><div class="s" id="lwS"></div></div>
      <div class="tile"><div class="k">Verschil</div><div class="v" id="rng">–</div><div class="s" id="rngS"></div></div>
    </div>
    <svg id="spark" viewBox="0 0 360 74" preserveAspectRatio="none" aria-label="Waterstand komende 30 uur"></svg>
  </div>
  <div class="colofon">Ralph Wagter · <a href="https://claude.ai/code">Claude Code</a> ·
    <a href="https://eupl.eu/">EUPL-1.2</a> · <a href="https://github.com/rwrw01/tides">GitHub</a> ·
    data <a href="https://open-meteo.com">Open-Meteo</a> · radar <a href="https://www.rainviewer.com">RainViewer</a> (niet voor navigatie)</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
"use strict";
const $ = id => document.getElementById(id);
const fmt1 = x => (Math.round(x*10)/10).toLocaleString('nl-NL',{minimumFractionDigits:1,maximumFractionDigits:1});
const clock = ms => { const d = new Date(ms);
  return String(d.getUTCHours()).padStart(2,'0') + ':' + String(d.getUTCMinutes()).padStart(2,'0'); };
const inMin = (ms, now) => { const m = Math.round((ms-now)/60000);
  return m >= 60 ? 'over ' + Math.floor(m/60) + ' u ' + String(m%60).padStart(2,'0') + ' m' : 'over ' + m + ' m'; };

/* -------- kaart -------- */
const TILE_LIGHT = 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
const TILE_DARK  = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
const TILE_SAT   = 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}';
const darkMq = matchMedia('(prefers-color-scheme: dark)');
let map = null, marker = null, base = null, satOn = false;
const baseUrl = () => satOn ? TILE_SAT : (darkMq.matches ? TILE_DARK : TILE_LIGHT);
if (typeof L !== 'undefined'){
  map = L.map('map', {zoomControl:false, worldCopyJump:true}).setView([52.1, 4.3], 6);
  base = L.tileLayer(baseUrl(), {maxZoom:17,
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CARTO &middot; beeld Esri'}).addTo(map);
  darkMq.addEventListener('change', () => { if (!satOn) base.setUrl(baseUrl()); });
  map.on('click', e => selectLocation(e.latlng.lat, e.latlng.lng));
} else {
  $('mapErr').style.display = 'flex';
  $('layerBtn').style.display = 'none';
  $('radarBtn').style.display = 'none';
}
$('layerBtn').addEventListener('click', () => { satOn = !satOn; if (base) base.setUrl(baseUrl()); });

/* -------- buienradar (RainViewer, alleen verleden) -------- */
let radarOn = false, radarFrames = [], radarLayers = [], radarIdx = 0, radarTimer = null;
async function radarInit(){
  const r = await fetch('https://api.rainviewer.com/public/weather-maps.json');
  if (!r.ok) throw new Error('radar http ' + r.status);
  const j = await r.json();
  radarFrames = ((j.radar && j.radar.past) || []).map(f =>
    ({ time: f.time, url: j.host + f.path + '/256/{z}/{x}/{y}/2/1_1.png' }));
  if (!radarFrames.length) throw new Error('geen radarframes');
  $('radarSlider').max = radarFrames.length - 1;
}
function radarShow(i){
  radarIdx = i;
  if (!radarLayers[i]){
    radarLayers[i] = L.tileLayer(radarFrames[i].url, {opacity:0, maxNativeZoom:12, maxZoom:17}).addTo(map);
  }
  radarLayers.forEach((l, k) => l && l.setOpacity(k === i ? 0.65 : 0));
  $('radarSlider').value = i;
  const d = new Date(radarFrames[i].time * 1000);
  $('radarTime').textContent = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function radarStop(){ if (radarTimer){ clearInterval(radarTimer); radarTimer = null; $('radarPlay').textContent = '▶'; } }
$('radarBtn').addEventListener('click', async () => {
  radarOn = !radarOn;
  $('radarBtn').classList.toggle('on', radarOn);
  $('radarBar').classList.toggle('on', radarOn);
  if (radarOn){
    try {
      if (!radarFrames.length) await radarInit();
      radarShow(radarFrames.length - 1);
    } catch(e){
      $('radarTime').textContent = 'radar offline';
    }
  } else {
    radarStop();
    radarLayers.forEach(l => l && l.setOpacity(0));
  }
});
$('radarSlider').addEventListener('input', e => { radarStop(); if (radarFrames.length) radarShow(+e.target.value); });
$('radarPlay').addEventListener('click', () => {
  if (!radarFrames.length) return;
  if (radarTimer){ radarStop(); return; }
  $('radarPlay').textContent = '⏸';
  radarTimer = setInterval(() => radarShow((radarIdx + 1) % radarFrames.length), 600);
});

/* -------- data -------- */
async function fetchSeries(lat, lon){
  const url = 'https://marine-api.open-meteo.com/v1/marine?latitude=' + lat.toFixed(4) +
    '&longitude=' + lon.toFixed(4) +
    '&hourly=sea_level_height_msl&past_days=1&forecast_days=2&timezone=auto&cell_selection=sea';
  const res = await fetch(url);
  if (!res.ok) throw new Error('Kon geen data ophalen (HTTP ' + res.status + ')');
  const j = await res.json();
  const times = (j.hourly && j.hourly.time) || [], raw = (j.hourly && j.hourly.sea_level_height_msl) || [];
  const t = [], h = [];
  for (let i = 0; i < times.length; i++){
    if (raw[i] === null || raw[i] === undefined) continue;
    t.push(Date.parse(times[i] + ':00Z')); h.push(raw[i]);
  }
  if (h.length < 30){
    const e = new Error('Geen getijdedata hier (binnenland of ver van zee) — kaart en radar werken wél');
    e.soft = true; throw e;
  }
  return { t, h, utcOffset: (j.utc_offset_seconds || 0) * 1000 };
}
function findExtrema(t, h){
  const ex = [];
  for (let i = 1; i < h.length-1; i++){
    const mx = h[i] >= h[i-1] && h[i] >= h[i+1] && (h[i] > h[i-1] || h[i] > h[i+1]);
    const mn = h[i] <= h[i-1] && h[i] <= h[i+1] && (h[i] < h[i-1] || h[i] < h[i+1]);
    if (!mx && !mn) continue;
    const den = h[i-1] - 2*h[i] + h[i+1];
    let off = 0, hv = h[i];
    if (Math.abs(den) > 1e-9){
      off = Math.max(-0.5, Math.min(0.5, 0.5*(h[i-1]-h[i+1])/den));
      hv = h[i] - 0.25*(h[i-1]-h[i+1])*off;
    }
    const e = { time: t[i] + off*(t[i+1]-t[i-1])/2, h: hv, type: mx ? 'H' : 'L' };
    const last = ex[ex.length-1];
    if (last && last.type === e.type && e.time - last.time < 4*3600e3){
      if ((e.type==='H' && e.h>last.h) || (e.type==='L' && e.h<last.h)) ex[ex.length-1] = e;
    } else ex.push(e);
  }
  return ex;
}

/* -------- UI -------- */
function selectLocation(lat, lon){
  lat = Math.round(lat*1e4)/1e4; lon = Math.round(lon*1e4)/1e4;
  if (map){ if (marker) marker.setLatLng([lat,lon]); else marker = L.marker([lat,lon]).addTo(map); }
  $('locName').textContent = Math.abs(lat).toFixed(2)+'°'+(lat>=0?'N':'Z')+' '+Math.abs(lon).toFixed(2)+'°'+(lon>=0?'O':'W');
  const hint = $('hint'); hint.className='hint'; hint.style.display='block'; hint.textContent='Laden…';
  $('data').style.display='none'; $('pill').style.display='none';
  fetchSeries(lat, lon).then(s => {
    try { localStorage.setItem('tidepin', JSON.stringify({lat, lon})); } catch(e){}
    render(s);
  }).catch(err => {
    hint.className = err && err.soft ? 'hint' : 'hint err';
    hint.textContent = (err && err.soft ? '🌍 ' : '⚠️ ') + (err.message || 'Er ging iets mis');
  });
}
function render(s){
  const now = Date.now() + s.utcOffset;
  const ex = findExtrema(s.t, s.h);
  const ranges = [];
  for (let i = 1; i < ex.length; i++) if (ex[i].type !== ex[i-1].type) ranges.push(Math.abs(ex[i].h - ex[i-1].h));
  const mean = ranges.length ? ranges.reduce((a,b)=>a+b,0)/ranges.length : 0;
  const fut = ex.filter(e => e.time > now);
  const hw = fut.find(e => e.type==='H'), lw = fut.find(e => e.type==='L');
  $('hint').style.display='none'; $('data').style.display='block';
  $('hwT').textContent = hw ? clock(hw.time) : '–';
  $('hwS').textContent = hw ? inMin(hw.time, now) : '';
  $('lwT').textContent = lw ? clock(lw.time) : '–';
  $('lwS').textContent = lw ? inMin(lw.time, now) : '';
  $('rng').textContent = mean >= 0.5 ? fmt1(mean) + ' m' : Math.round(mean*100) + ' cm';
  $('rngS').textContent = hw && lw ? 'nu ' + fmt1(heightNow(s, now)) + ' m (MSL)' : '';
  const pill = $('pill'); pill.style.display='inline-block';
  if (mean < 0.3){ pill.className='pill'; pill.textContent='vrijwel geen getij'; }
  else if (mean < 2){ pill.className='pill micro'; pill.textContent='microtidaal'; }
  else if (mean < 4){ pill.className='pill meso'; pill.textContent='mesotidaal'; }
  else { pill.className='pill macro'; pill.textContent='macrotidaal'; }
  spark(s, ex, now);
}
function heightNow(s, now){
  let i = s.t.findIndex(t => t >= now);
  if (i <= 0) return s.h[0];
  const f = (now - s.t[i-1]) / (s.t[i] - s.t[i-1]);
  return s.h[i-1] + f*(s.h[i] - s.h[i-1]);
}
function spark(s, ex, now){
  const W=360, H=74, padT=14, padB=8;
  const x0 = now - 6*3600e3, x1 = now + 30*3600e3;
  const pts = [];
  for (let i = 0; i < s.t.length; i++) if (s.t[i] >= x0 - 3600e3 && s.t[i] <= x1 + 3600e3) pts.push(i);
  if (!pts.length){ $('spark').innerHTML=''; return; }
  let mn = Infinity, mx = -Infinity;
  for (const i of pts){ mn = Math.min(mn, s.h[i]); mx = Math.max(mx, s.h[i]); }
  const span = Math.max(mx - mn, .1); mn -= span*.12; mx += span*.12;
  const X = t => (t - x0)/(x1 - x0)*W, Y = v => padT + (mx - v)/(mx - mn)*(H - padT - padB);
  let line = '';
  for (let k = 0; k < pts.length; k++){ const i = pts[k];
    line += (k ? 'L' : 'M') + X(s.t[i]).toFixed(1) + ' ' + Y(s.h[i]).toFixed(1) + ' '; }
  let g = `<path d="${line} L ${X(s.t[pts[pts.length-1]]).toFixed(1)} ${H} L ${X(s.t[pts[0]]).toFixed(1)} ${H} Z" fill="rgba(18,118,176,.18)"/>` +
          `<path d="${line}" fill="none" stroke="#1276b0" stroke-width="2"/>`;
  for (const e of ex){
    if (e.time < x0 || e.time > x1) continue;
    const c = e.type === 'H' ? '#1276b0' : '#ff9500';
    g += `<circle cx="${X(e.time)}" cy="${Y(e.h)}" r="3" fill="${c}"/>` +
         `<text x="${X(e.time)}" y="${e.type==='H' ? Y(e.h)-6 : Y(e.h)+13}" text-anchor="middle" font-size="9" font-weight="600" fill="${c}">${clock(e.time)}</text>`;
  }
  g += `<line x1="${X(now)}" y1="2" x2="${X(now)}" y2="${H}" stroke="#ff3b30" stroke-width="1.4"/>`;
  $('spark').innerHTML = g;
}

/* -------- locatieknop + start -------- */
$('locBtn').addEventListener('click', () => {
  if (!navigator.geolocation){ return; }
  navigator.geolocation.getCurrentPosition(p => {
    if (map) map.setView([p.coords.latitude, p.coords.longitude], 9);
    selectLocation(p.coords.latitude, p.coords.longitude);
  }, () => {
    const h = $('hint'); h.style.display='block'; h.className='hint err';
    h.textContent = 'Locatie niet beschikbaar — tik op de kaart';
  }, {timeout: 8000});
});
try {
  const saved = JSON.parse(localStorage.getItem('tidepin') || 'null');
  if (saved && typeof saved.lat === 'number'){
    if (map) map.setView([saved.lat, saved.lon], 8);
    selectLocation(saved.lat, saved.lon);
  }
} catch(e){}
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
